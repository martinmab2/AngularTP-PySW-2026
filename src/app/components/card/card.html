<div class="card shadow-sm h-100 card-fixed">
  <img [src]="img" class="card-img-top img-fixed" [alt]="nombre">
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ nombre }}</h5>
    <p class="card-text text-muted flex-grow-1">{{ descripcion }}</p>
    <p class="fw-bold text-primary mb-3">Precio: ${{ precio.toFixed(2) }}</p>
    
    <div class="d-flex gap-2 align-items-center mb-2">
      <label for="cantidad" class="form-label mb-0">Cantidad:</label>
      <input type="number" id="cantidad" [(ngModel)]="cantidad" min="1" class="form-control form-control-sm" style="width: 70px;">
    </div>
    
    <button (click)="addToCart()" class="btn btn-primary w-100">
      <i class="bi bi-cart-plus"></i> Agregar al Carrito
    </button>
  </div>
</div>
