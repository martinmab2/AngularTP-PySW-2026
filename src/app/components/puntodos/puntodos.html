<div class="puntodos-container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Catálogo de Productos</h2>
    <app-cart></app-cart>
  </div>
  
  <div class="row g-4">
    <div class="col-lg-3 col-md-4 col-sm-6 d-flex justify-content-center" *ngFor="let prod of seleccionProductos">
      <app-card [id]="prod.id"
                [nombre]="prod.nombre"
                [descripcion]="prod.descripcion"
                [img]="prod.img"
                [precio]="prod.precio">
      </app-card>
    </div>
  </div>
</div>
